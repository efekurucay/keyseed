name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - name: macos-apple-silicon
            os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libasound2-dev \
            libudev-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux release
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          PACKAGE_DIR="dist/hashit-${VERSION}-${{ matrix.name }}"
          mkdir -p "$PACKAGE_DIR"
          cp "target/${{ matrix.target }}/release/hashit" "$PACKAGE_DIR/hashit"
          cp README.md LICENSE "$PACKAGE_DIR/"
          tar -czf "dist/hashit-${VERSION}-${{ matrix.name }}.tar.gz" -C dist "hashit-${VERSION}-${{ matrix.name }}"

      - name: Package macOS release
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          APP_DIR="dist/Hashit.app"
          CONTENTS_DIR="$APP_DIR/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"
          mkdir -p "$MACOS_DIR"
          cp "target/${{ matrix.target }}/release/hashit" "$MACOS_DIR/Hashit"
          chmod +x "$MACOS_DIR/Hashit"
          cat > "$CONTENTS_DIR/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>Hashit</string>
            <key>CFBundleIdentifier</key>
            <string>com.efekurucay.hashit</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Hashit</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION#v}</string>
            <key>CFBundleVersion</key>
            <string>${VERSION#v}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          tar -czf "dist/hashit-${VERSION}-${{ matrix.name }}.tar.gz" -C dist Hashit.app

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $packageDir = "dist/hashit-$env:VERSION-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/hashit.exe" "$packageDir/hashit.exe"
          Copy-Item README.md "$packageDir/README.md"
          Copy-Item LICENSE "$packageDir/LICENSE"
          Compress-Archive -Path $packageDir -DestinationPath "dist/hashit-$env:VERSION-${{ matrix.name }}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/hashit-${{ env.VERSION }}-${{ matrix.name }}.${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*
