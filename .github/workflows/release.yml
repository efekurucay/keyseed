name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - name: macos-apple-silicon
            os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - name: macos-intel
            os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux release
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          PACKAGE_DIR="dist/keyseed-${VERSION}-${{ matrix.name }}"
          mkdir -p "$PACKAGE_DIR"
          cp "target/${{ matrix.target }}/release/keyseed" "$PACKAGE_DIR/keyseed"
          cp README.md LICENSE "$PACKAGE_DIR/"
          tar -czf "dist/keyseed-${VERSION}-${{ matrix.name }}.tar.gz" -C dist "keyseed-${VERSION}-${{ matrix.name }}"

      - name: Package macOS release
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          PACKAGE_DIR="dist/keyseed-${VERSION}-${{ matrix.name }}"
          mkdir -p "$PACKAGE_DIR"
          cp "target/${{ matrix.target }}/release/keyseed" "$PACKAGE_DIR/keyseed"
          cp README.md LICENSE "$PACKAGE_DIR/"
          tar -czf "dist/keyseed-${VERSION}-${{ matrix.name }}.tar.gz" -C dist "keyseed-${VERSION}-${{ matrix.name }}"

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $packageDir = "dist/keyseed-$env:VERSION-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/keyseed.exe" "$packageDir/keyseed.exe"
          Copy-Item README.md "$packageDir/README.md"
          Copy-Item LICENSE "$packageDir/LICENSE"
          Compress-Archive -Path $packageDir -DestinationPath "dist/keyseed-$env:VERSION-${{ matrix.name }}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/keyseed-${{ env.VERSION }}-${{ matrix.name }}.${{ matrix.archive }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          sha256sum * > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*
